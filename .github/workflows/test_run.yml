name: Wyvern Telemetry Scanner Engine Node.js 24 Test Run

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  execute-node-test-run:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out your repository code into the runner workspace
    - name: Check out repository code
      uses: actions/checkout@v4

    # Step 2: Set up an isolated Node.js 24 container environment
    # Automated caching is locked to npm to look for package-lock.json automatically
    - name: Configure Node.js 24 Runtime Environment
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    # Step 3: Run clean installer sequence utilizing the lockfile
    - name: Install Project Workspace Dependencies
      run: npm ci

    # Step 4: Execute the primary script engine test sweep
    - name: Execute Strict Sequential Matrix Telemetry Test Run
      run: node engine.js
