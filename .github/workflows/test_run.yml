name: Wyvern Telemetry Scanner Engine Node.js 24 Test Run

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  execute-node-test-run:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    # Setup the exact current stable release node container environment
    - name: Configure Node.js 24 Runtime Environment
      uses: actions/setup-node@v4
      with:
        node-version: '24' 

    # If you use external packages (like mathjs), this restores your package locks
    - name: Install Project Workspace Dependencies
      run: |
        if [ -f package.json ]; then npm ci; fi

    # Execute the primary script engine module using Node.js
    - name: Execute Strict Sequential Matrix Telemetry Test Run
      run: |
        node engine.js
