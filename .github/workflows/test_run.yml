name: Wyvern Telemetry Scanner Engine Test Run

# Trigger this workflow every time code is pushed or a pull request is submitted to main
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  execute-test-run:
    # Run the test container on the latest open-source Ubuntu Linux image
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out your repository code into the runner workspace
    - name: Check out repository code
      uses: actions/checkout@v4

    # Step 2: Set up an isolated Python execution environment
    - name: Configure Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Locks runtime environment parameters

    # Step 3: Install core analytical and array processing dependencies
    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy

    # Step 4: Execute a live simulation test sweep
    # This runs the main block inside engine.py to verify your budget scaling logic
    - name: Execute Strict Sequential Matrix Telemetry Test Run
      run: |
        python engine.py
